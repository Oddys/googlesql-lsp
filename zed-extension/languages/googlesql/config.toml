name = "GoogleSQL"
# BigQuery/GoogleSQL scripts. `.sql` is included so existing BigQuery files light up;
# if another SQL extension also claims `.sql`, use `.bqsql`/`.googlesql` or set a file
# association in your Zed settings.
path_suffixes = ["sql", "bqsql", "googlesql"]
line_comments = ["-- "]
autoclose_before = ";:.,=}])>"

brackets = [
    { start = "(", end = ")", close = true, newline = false },
    { start = "[", end = "]", close = true, newline = false },
    { start = "'", end = "'", close = true, newline = false },
    { start = "\"", end = "\"", close = true, newline = false },
    { start = "`", end = "`", close = true, newline = false },
]
