id = "googlesql"
name = "GoogleSQL"
version = "0.1.0"
schema_version = 1
authors = ["Oddys"]
description = "Error highlighting for BigQuery (GoogleSQL) files, backed by Google's official GoogleSQL parser. Requires a running Docker daemon to run the parser in a container."
repository = "https://github.com/Oddys/googlesql-lsp"

# We attach our language server to Zed's existing `SQL` language (provided by the
# built-in SQL extension) rather than defining our own language + grammar. Defining
# a competing `GoogleSQL` language shadowed the SQL extension and killed syntax
# highlighting; shipping our own `sql` grammar is impossible because its parser
# exports the C symbol `tree_sitter_sql`, which collides with the SQL extension's
# grammar of the same id. Contributing only the LSP avoids both problems: the SQL
# extension keeps providing grammar + highlighting, and we add error diagnostics.
[language_servers.googlesql]
name = "googlesql"
languages = ["SQL"]
